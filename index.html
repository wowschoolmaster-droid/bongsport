<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>봉담초 실시간 연결 끝장판</title>
    <!-- [수정] 가장 안정적인 소스 3개를 순차적으로 배치 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body style="background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif;">

    <h1>📡 실시간 연결 끝장 테스트</h1>
    
    <div style="margin: 30px auto; padding: 20px; border: 2px solid #555; max-width: 400px; border-radius: 15px;">
        <h3 id="lib-status" style="color: #ff4444;">라이브러리 로드 대기 중...</h3>
        <h3 id="db-status" style="color: #888;">DB 연결 대기 중...</h3>
        <hr style="border: 0.5px solid #333;">
        <p>서버 수신 시간:</p>
        <h2 id="db-data" style="color: #00ff00;">- - : - - : - -</h2>
    </div>

    <button id="sendBtn" onclick="sendTime()" disabled style="padding: 20px 40px; font-size: 20px; cursor: not-allowed; background: #555; color: white; border: none; border-radius: 10px;">
        연결 대기 중...
    </button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD1Hv7lUlS-xOpGT_vQhas4nHlpK42MDzg",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "bongteacher-15070",
            storageBucket: "bongteacher-15070.firebasestorage.app",
            messagingSenderId: "141118027536",
            appId: "1:141118027536:web:deb2310805042800229795"
        };

        // [핵심] 파이어베이스가 로드될 때까지 무한 반복 체크
        function checkFirebase() {
            if (typeof firebase !== 'undefined') {
                console.log("Firebase 로드 성공!");
                document.getElementById('lib-status').innerText = "라이브러리 준비 완료! ✅";
                document.getElementById('lib-status').style.color = "#00ff00";
                startSystem();
            } else {
                console.log("Firebase 기다리는 중...");
                setTimeout(checkFirebase, 500); // 0.5초마다 재확인
            }
        }

        function startSystem() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const database = firebase.database();
                
                // 데이터 수신 리스너
                database.ref('test-final-call').on('value', (snapshot) => {
                    const data = snapshot.val();
                    document.getElementById('db-status').innerText = "DB 실시간 연결 성공! 📡";
                    document.getElementById('db-status').style.color = "#00ff00";
                    document.getElementById('db-data').innerText = data ? data : "버튼을 누르세요!";
                    
                    // 버튼 활성화
                    const btn = document.getElementById('sendBtn');
                    btn.disabled = false;
                    btn.innerText = "🚀 현재 시간 전송";
                    btn.style.background = "#2196f3";
                    btn.style.cursor = "pointer";
                });

                window.sendTime = function() {
                    const now = new Date().toLocaleTimeString();
                    database.ref('test-final-call').set(now);
                };
            } catch (e) {
                document.getElementById('db-status').innerText = "DB 초기화 실패: " + e.message;
            }
        }

        // 페이지 열리자마자 체크 시작
        checkFirebase();
    </script>
</body>
</html>
